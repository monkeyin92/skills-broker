name: CI

on:
  push:
  pull_request:

jobs:
  trust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI blind-spot report
        run: npm run ci:blind-spot

      - name: Run capability trust check
        run: npm run ci:capability-trust

      - name: Run narrative parity suite
        run: npm run test:ci:narrative-parity

  test:
    runs-on: ubuntu-latest
    needs: trust

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable runtime
        run: npm run build

      - name: Run test suite
        run: npm test

  status:
    runs-on: ubuntu-latest
    needs: trust

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable runtime
        run: npm run build

      - name: Materialize strict-doctor shared home
        shell: bash
        run: |
          set -euo pipefail
          broker_home="${RUNNER_TEMP}/status-doctor/.skills-broker"
          claude_dir="${RUNNER_TEMP}/status-doctor/.claude/skills/skills-broker"
          codex_dir="${RUNNER_TEMP}/status-doctor/.agents/skills/skills-broker"
          opencode_dir="${RUNNER_TEMP}/status-doctor/.config/opencode/skills/skills-broker"
          node dist/bin/skills-broker.js update \
            --broker-home "$broker_home" \
            --claude-dir "$claude_dir" \
            --codex-dir "$codex_dir" \
            --opencode-dir "$opencode_dir"
          node ./scripts/seed-strict-doctor-shared-home.mjs "$broker_home"

      - name: Run strict status doctor
        shell: bash
        run: |
          set -euo pipefail
          ship_ref="origin/${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          broker_home="${RUNNER_TEMP}/status-doctor/.skills-broker"
          claude_dir="${RUNNER_TEMP}/status-doctor/.claude/skills/skills-broker"
          codex_dir="${RUNNER_TEMP}/status-doctor/.agents/skills/skills-broker"
          opencode_dir="${RUNNER_TEMP}/status-doctor/.config/opencode/skills/skills-broker"
          node dist/bin/skills-broker.js doctor --strict \
            --refresh-remote \
            --broker-home "$broker_home" \
            --claude-dir "$claude_dir" \
            --codex-dir "$codex_dir" \
            --opencode-dir "$opencode_dir" \
            --repo-root "$GITHUB_WORKSPACE" \
            --ship-ref "$ship_ref"
