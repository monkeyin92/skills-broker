name: CI

on:
  push:
  pull_request:

jobs:
  trust:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI blind-spot report
        run: npm run ci:blind-spot

      - name: Run narrative parity suite
        run: npm run test:ci:narrative-parity

  test:
    runs-on: ubuntu-latest
    needs: trust

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable runtime
        run: npm run build

      - name: Run test suite
        run: npm test

  status:
    runs-on: ubuntu-latest
    needs: trust

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build distributable runtime
        run: npm run build

      - name: Run strict status doctor
        shell: bash
        run: |
          set -euo pipefail
          ship_ref="origin/${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          node dist/bin/skills-broker.js doctor --strict --refresh-remote --repo-root "$GITHUB_WORKSPACE" --ship-ref "$ship_ref"
