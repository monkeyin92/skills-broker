name: Publish npm package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Capture package version
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_NAME=${package_name}" >> "${GITHUB_ENV}"
          echo "PACKAGE_VERSION=${package_version}" >> "${GITHUB_ENV}"

          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag_version="${GITHUB_REF_NAME#v}"
            if [ "${tag_version}" != "${package_version}" ]; then
              echo "Tag version ${tag_version} does not match package.json ${package_version}." >&2
              exit 1
            fi
          fi

      - name: Ensure version is unpublished
        shell: bash
        run: |
          set -euo pipefail
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published." >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Run canonical release gate
        run: npm run release:gate -- --json --ship-ref "origin/${DEFAULT_BRANCH}"

      - name: Build distributable runtime
        run: npm run build

      - name: Run test suite
        run: npm test -- --run

      - name: Publish package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Promote canonical shipped proofs
        shell: bash
        run: |
          set -euo pipefail
          ship_ref="origin/${DEFAULT_BRANCH}"
          npm run release:promote -- --json --ship-ref "${ship_ref}"

          if git diff --quiet -- STATUS.md; then
            echo "No shipped proof promotions were needed."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git commit -m "chore: promote shipped proof state after ${GITHUB_REF_NAME}"
          git push origin "HEAD:${DEFAULT_BRANCH}"

      - name: Close publish flow on canonical release truth
        run: npm run release:gate -- --json --ship-ref "origin/${DEFAULT_BRANCH}"
